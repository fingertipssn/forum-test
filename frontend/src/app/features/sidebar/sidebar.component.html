<nav class="sidebar-nav">

  <!-- New Topic button -->
  @if (auth.isAuthenticated()) {
    <div class="sidebar-new-topic">
      <button class="btn btn-primary w-full btn-sm" (click)="openNewTopic()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo tema
      </button>
    </div>
  }

  <!-- Main links -->
  <ul class="sidebar-menu">
    <li>
      <a routerLink="/latest" routerLinkActive="active">
        <span class="sidebar-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </span>
        <span>Recientes</span>
      </a>
    </li>
    <li>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
        <span class="sidebar-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </span>
        <span>Categorías</span>
      </a>
    </li>
    @if (auth.isAuthenticated()) {
      <li>
        <a routerLink="/bookmarks" routerLinkActive="active">
          <span class="sidebar-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          </span>
          <span>Guardados</span>
        </a>
      </li>
    }
  </ul>

  <!-- Categories -->
  @if (categories().length > 0) {
    <hr class="sidebar-divider" />
    <div class="sidebar-section-title">Categorías</div>
    <ul class="sidebar-menu sidebar-categories">
      @for (cat of categories(); track cat.id) {
        <li>
          <a [routerLink]="['/c', cat.slug]" routerLinkActive="active">
            <span class="cat-dot" [style.background]="'#' + cat.color"></span>
            <span class="cat-name">{{ cat.name }}</span>
            @if (cat.topicCount > 0) {
              <span class="cat-count">{{ cat.topicCount }}</span>
            }
          </a>
        </li>
      }
    </ul>
  }


</nav>
